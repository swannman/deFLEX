<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FLEX Pager Feed</title>
<style>
  :root {
    --bg: #0d1117;
    --bar: #161b22;
    --line: #1f2630;
    --txt: #c9d1d9;
    --dim: #6e7681;
    --accent: #3fb950;
    --garble: #56607a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--txt);
    font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    background: var(--bar);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--line);
    flex: 0 0 auto;
  }
  header h1 { font-size: 14px; margin: 0; font-weight: 600; letter-spacing: .02em; }
  header .stat { color: var(--dim); font-size: 12px; }
  header .dot { color: var(--accent); }
  header label { color: var(--dim); font-size: 12px; cursor: pointer; user-select: none; }
  header .spacer { flex: 1; }
  #feed {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 6px 0 14px;
  }
  .msg {
    padding: 3px 14px;
    border-bottom: 1px solid var(--line);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg .meta { color: var(--dim); font-size: 11px; margin-right: 10px; }
  .msg .net {
    color: var(--accent);
    font-size: 11px;
    margin-right: 10px;
    display: inline-block;
    min-width: 64px;
  }
  .msg.garble .body { color: var(--garble); }
  .msg .stitch {
    color: #d29922;
    font-size: 11px;
    margin-right: 6px;
  }
  .msg.new { animation: flash 1s ease-out; }
  @keyframes flash { from { background: #1d2b1d; } to { background: transparent; } }
  #empty { color: var(--dim); padding: 20px 14px; }
</style>
</head>
<body>
<header>
  <h1>FLEX Pager Feed</h1>
  <span class="stat"><span id="dot" class="dot">●</span> <span id="status">connecting…</span></span>
  <span class="stat" id="count">0 msgs</span>
  <span class="stat" id="dedup"></span>
  <span class="spacer"></span>
  <label><input type="checkbox" id="hideGarble" checked> hide garbled</label>
</header>
<div id="feed"><div id="empty">waiting for pages…</div></div>

<script>
const feed = document.getElementById('feed');
const statusEl = document.getElementById('status');
const dot = document.getElementById('dot');
const countEl = document.getElementById('count');
const hideGarble = document.getElementById('hideGarble');
const MAX_ROWS = 500;
let count = 0;

function atBottom() {
  return feed.scrollHeight - feed.scrollTop - feed.clientHeight < 60;
}

function fmtTime(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleTimeString([], {hour12: false});
}

function addMsg(m, animate) {
  const empty = document.getElementById('empty');
  if (empty) empty.remove();

  const stick = atBottom();
  const row = document.createElement('div');
  row.className = 'msg' + (m.readable ? '' : ' garble') + (animate ? ' new' : '');
  if (!m.readable) row.dataset.garble = '1';
  if (hideGarble.checked && !m.readable) row.style.display = 'none';

  const meta = document.createElement('span');
  meta.className = 'meta';
  meta.textContent = fmtTime(m.ts);
  const net = document.createElement('span');
  net.className = 'net';
  net.textContent = m.net;
  const body = document.createElement('span');
  body.className = 'body';
  body.textContent = m.body;

  row.append(meta, net);
  if (m.stitched) {
    const st = document.createElement('span');
    st.className = 'stitch';
    st.textContent = '⋯joined';
    st.title = 'reassembled from multiple FLEX fragments';
    row.append(st);
  }
  row.append(body);
  feed.appendChild(row);

  while (feed.children.length > MAX_ROWS) feed.removeChild(feed.firstChild);

  count++;
  countEl.textContent = count + ' msgs';
  if (stick) feed.scrollTop = feed.scrollHeight;
}

hideGarble.addEventListener('change', () => {
  const stick = atBottom();
  document.querySelectorAll('.msg[data-garble]').forEach(r => {
    r.style.display = hideGarble.checked ? 'none' : '';
  });
  if (stick) feed.scrollTop = feed.scrollHeight;
});

async function loadRecent() {
  try {
    const r = await fetch('/recent');
    const msgs = await r.json();
    msgs.forEach(m => addMsg(m, false));
    feed.scrollTop = feed.scrollHeight;
  } catch (e) { /* ignore */ }
}

async function pollStats() {
  try {
    const r = await fetch('/stats');
    const s = await r.json();
    const d = document.getElementById('dedup');
    d.textContent = s.deduped ? `${s.deduped} dup · ${s.stitched} joined` : '';
  } catch (e) { /* ignore */ }
}
setInterval(pollStats, 5000);

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => { statusEl.textContent = 'live'; dot.style.color = 'var(--accent)'; };
  ws.onmessage = (ev) => addMsg(JSON.parse(ev.data), true);
  ws.onclose = () => {
    statusEl.textContent = 'reconnecting…';
    dot.style.color = '#f85149';
    setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
}

loadRecent().then(connect);
</script>
</body>
</html>
